<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 24 780 224" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif">
  <defs>
    <style>
      .card { fill: #FFFFFF; stroke: #2563EB; stroke-width: 1.8; }
      .keep { fill: #FFF1F2; stroke: #E11D48; stroke-width: 2; }
      .type { fill: #0F2C59; font-size: 14px; font-weight: 800; }
      .what { fill: #57534E; font-size: 11px; font-weight: 600; }
      .scope { fill: #2563EB; font-size: 10.5px; font-weight: 800; }
      .scopeK { fill: #E11D48; font-size: 10.5px; font-weight: 800; }
    </style>
  </defs>

  <rect class="card" x="40" y="40" width="350" height="92" rx="12"/>
  <text x="64" y="70" class="type">① 분량 줄이기</text>
  <text x="64" y="92" class="what">임원 보고용 2페이지로 축약</text>
  <text x="64" y="114" class="scope">범위: 본문만 — 출처·표는 보존</text>

  <rect class="card" x="410" y="40" width="350" height="92" rx="12"/>
  <text x="434" y="70" class="type">② 순서 바꾸기</text>
  <text x="434" y="92" class="what">"둔화 → 그래서 차별화" 순서로</text>
  <text x="434" y="114" class="scope">범위: 그 절만 — 다른 절은 그대로</text>

  <rect class="card" x="40" y="140" width="350" height="92" rx="12"/>
  <text x="64" y="170" class="type">③ 근거 보태기</text>
  <text x="64" y="192" class="what">"1식 9,000원"에 출처 또는 '가정'</text>
  <text x="64" y="214" class="scope">범위: 해당 문장만</text>

  <rect class="keep" x="410" y="140" width="350" height="92" rx="12"/>
  <text x="434" y="170" class="type">④ 그대로 두기 🔒</text>
  <text x="434" y="192" class="what">문서번호 · 결재란</text>
  <text x="434" y="214" class="scopeK">범위: 건드리지 않기</text>
</svg>
