<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 24 780 220" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif">
  <defs>
    <style>
      .stop { fill: #FEF3C7; stroke: #D97706; stroke-width: 2.2; }
      .title { fill: #B45309; font-size: 14.5px; font-weight: 800; }
      .sub { fill: #57534E; font-size: 11px; font-weight: 600; }
      .chip { fill: #FFFFFF; stroke: #D97706; stroke-width: 1.3; }
      .chipt { fill: #0F2C59; font-size: 10.5px; font-weight: 700; }
      .item { fill: #0F2C59; font-size: 11px; font-weight: 700; }
      .go { fill: #059669; font-size: 11px; font-weight: 800; }
    </style>
  </defs>

  <rect class="stop" x="30" y="40" width="350" height="192" rx="13"/>
  <text x="52" y="74" class="title">✋ ① 만들 땐 — 계획만 먼저</text>
  <text x="52" y="102" class="sub">Skill이든 새 작업이든, 첫 호출은</text>
  <text x="52" y="122" class="sub">실행하지 말고 계획부터 받는다.</text>
  <rect class="chip" x="52" y="136" width="306" height="44" rx="8"/>
  <text x="66" y="156" class="chipt">"바로 하지 말고, 어떤 순서로</text>
  <text x="66" y="172" class="chipt"> 뭘 할 건지 계획만 먼저 보여줘."</text>
  <text x="52" y="208" class="go">→ 의도가 맞으면 그때 진행</text>

  <rect class="stop" x="410" y="40" width="350" height="192" rx="13"/>
  <text x="432" y="74" class="title">✋ ② 보낼 땐 — 1분 6항목 체크</text>
  <text x="432" y="96" class="sub">메일은 나가면 못 되돌린다 · 전송은 늘 사람</text>
  <text x="432" y="124" class="item">① 수신자 맞나</text>
  <text x="432" y="146" class="item">② 제목 · 스레드 안 끊겼나</text>
  <text x="432" y="168" class="item">③ 본문 첨부 안내 = 실제 첨부</text>
  <text x="432" y="190" class="item">④ 첨부 개수</text>
  <text x="432" y="212" class="item">⑤ 첨부 버전 (파일 열어 최신본)</text>
  <text x="606" y="212" class="item">⑥ 민감정보</text>
</svg>
