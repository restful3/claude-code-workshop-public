<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 14 798 156" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="x1lr-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <marker id="x1lr-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
    <style>
      .inp { fill: #FEF3C7; stroke: #D97706; stroke-width: 2; }
      .step { fill: #E9F2FB; stroke: #2563EB; stroke-width: 2; }
      .title { fill: #0F2C59; font-size: 13px; font-weight: 800; }
      .desc { fill: #57534E; font-size: 10.5px; font-weight: 600; }
      .edge { stroke: #2563EB; stroke-width: 2.5; fill: none; marker-end: url(#x1lr-arrow); }
      .loop { stroke: #D97706; stroke-width: 2.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#x1lr-loop); }
      .loop-label { fill: #B45309; font-size: 11.5px; font-weight: 800; paint-order: stroke fill; stroke: #FAFAF9; stroke-width: 3px; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="inp" x="30" y="30" width="160" height="82" rx="11"/>
  <text x="110" y="66" text-anchor="middle" class="title">받기</text>
  <text x="110" y="88" text-anchor="middle" class="desc">메일 · 요청</text>

  <rect class="step" x="230" y="30" width="160" height="82" rx="11"/>
  <text x="310" y="66" text-anchor="middle" class="title">정리</text>
  <text x="310" y="88" text-anchor="middle" class="desc">리서치 · 근거</text>

  <rect class="step" x="430" y="30" width="160" height="82" rx="11"/>
  <text x="510" y="66" text-anchor="middle" class="title">만들기</text>
  <text x="510" y="88" text-anchor="middle" class="desc">문서 초안</text>

  <rect class="step" x="630" y="30" width="160" height="82" rx="11"/>
  <text x="710" y="66" text-anchor="middle" class="title">고치기</text>
  <text x="710" y="88" text-anchor="middle" class="desc">피드백 반영</text>

  <line class="edge" x1="190" y1="71" x2="226" y2="71"/>
  <line class="edge" x1="390" y1="71" x2="426" y2="71"/>
  <line class="edge" x1="590" y1="71" x2="626" y2="71"/>

  <path class="loop" d="M710,112 C710,150 110,150 110,114"/>
  <text x="410" y="153" text-anchor="middle" class="loop-label">다음 주 내 업무로 다시 — 같은 골격</text>
</svg>
